        }
        .dimension-score {

            color: #667eea;

        }
        .dimension-bar {
            height: 12px;
            background: #e2e8f0;
            border-radius: 6px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .dimension-fill {

            border-radius: 6px;

        }
        .dimension-labels {

        .timeline:before {

            position: absolute;
            left: 8px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: linear-gradient(180deg, #667eea, #764ba2);
            border-radius: 3px;
        }
        .timeline-item {
            position: relative;
            margin-bottom: 25px;
        }

            margin-bottom: 0;
        }
