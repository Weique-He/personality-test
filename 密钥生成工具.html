<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>密钥生成工具 - 性格测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            color: #2d3748;
            text-align: center;
            margin-bottom: 10px;
            font-size: 1.8rem;
        }

        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #4a5568;
            font-weight: 600;
            margin-bottom: 8px;
        }

        select, input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 25px;
            background: #f0f4ff;
            border-radius: 12px;
            border: 2px solid #667eea;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result h3 {
            color: #2d3748;
            margin-bottom: 15px;
        }

        .key-display {
            background: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            margin: 15px 0;
        }

        .key-code {
            font-size: 2rem;
            font-weight: 700;
            color: #667eea;
            letter-spacing: 5px;
            font-family: monospace;
        }

        .key-url {
            background: #f7fafc;
            padding: 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #4a5568;
            word-break: break-all;
            margin-top: 10px;
        }

        .copy-btn {
            background: #48bb78;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .copy-btn:hover {
            background: #38a169;
        }

        .instructions {
            margin-top: 25px;
            padding: 20px;
            background: #fff5f7;
            border-radius: 12px;
            border-left: 4px solid #f687b3;
        }

        .instructions h4 {
            color: #742a5d;
            margin-bottom: 10px;
        }

        .instructions ol {
            padding-left: 20px;
            color: #742a5d;
            line-height: 1.8;
        }

        .instructions li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔑 密钥生成工具</h1>
        <p class="subtitle">为用户生成报告解锁密钥</p>

        <div class="form-group">
            <label>用户性格类型：</label>
            <select id="personalityType">
                <option value="EJ">🌟 魅力领导者 (EJ)</option>
                <option value="EP">🎨 创意探索者 (EP)</option>
                <option value="IJ">🏆 稳健策划师 (IJ)</option>
                <option value="IP">🦋 自由思想家 (IP)</option>
            </select>
        </div>
        
        <div class="form-group" id="auto-detect" style="display:none;">
            <label style="color:#48bb78;">✅ 检测到未付款的测试结果：</label>
            <div style="background:#f0fff4;padding:15px;border-radius:8px;margin:10px 0;">
                <p style="color:#276749;"><strong>性格类型：</strong><span id="detected-type">-</span></p>
                <p style="color:#276749;"><strong>测试时间：</strong><span id="detected-time">-</span></p>
                <button class="copy-btn" onclick="useDetectedResult()" style="margin-top:10px;background:#48bb78;">使用此结果生成密钥</button>
            </div>
        </div>

        <button class="btn" onclick="generateKey()">生成密钥</button>

        <div class="result" id="result">
            <h3>✅ 密钥生成成功！</h3>
            <div class="key-display">
                <div class="key-code" id="keyCode">XXXX-XXXX</div>
            </div>
            <button class="copy-btn" onclick="copyKey()">📋 复制密钥</button>
            
            <div class="key-url" id="keyUrl"></div>
            <button class="copy-btn" onclick="copyUrl()" style="background: #667eea; margin-top: 5px;">📋 复制解锁链接</button>

            <div class="instructions">
                <h4>📋 使用流程：</h4>
                <ol>
                    <li>用户付款后，将密钥发送给用户</li>
                    <li>用户访问测试网页，点击「立即解锁」</li>
                    <li>输入密钥，点击验证</li>
                    <li>验证通过后自动跳转完整报告</li>
                </ol>
            </div>
        </div>
    </div>

    <script>
        // 页面加载时检查是否有未付款的测试结果
        window.addEventListener('DOMContentLoaded', function() {
            const testResult = JSON.parse(localStorage.getItem('testResult') || '{}');
            if (testResult.type) {
                document.getElementById('detected-type').textContent = testResult.type;
                document.getElementById('detected-time').textContent = new Date(testResult.timestamp).toLocaleString('zh-CN');
                document.getElementById('auto-detect').style.display = 'block';
                document.getElementById('personalityType').value = testResult.type;
            }
        });

        function useDetectedResult() {
            const testResult = JSON.parse(localStorage.getItem('testResult') || '{}');
            if (testResult.type) {
                document.getElementById('personalityType').value = testResult.type;
                generateKey();
            }
        }

        function generateKey() {
            const type = document.getElementById('personalityType').value;
            const timestamp = Date.now().toString(36).toUpperCase();
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            
            // 生成密钥格式：TYPE-随机码
            const key = `${type}-${random}${timestamp.substring(timestamp.length - 4)}`;
            
            // 存储密钥（简单实现，实际应该用数据库）
            const validKeys = JSON.parse(localStorage.getItem('validKeys') || '{}');
            validKeys[key] = {
                type: type,
                created: new Date().toISOString(),
                used: false
            };
            localStorage.setItem('validKeys', JSON.stringify(validKeys));
            
            // 显示结果
            document.getElementById('keyCode').textContent = key;
            document.getElementById('keyUrl').textContent = `解锁链接：https://Weique-He.github.io/personality-test/report.html?key=${key}`;
            document.getElementById('result').classList.add('show');
            
            // 滚动到结果
            document.getElementById('result').scrollIntoView({ behavior: 'smooth' });
        }

        function copyKey() {
            const key = document.getElementById('keyCode').textContent;
            navigator.clipboard.writeText(key).then(() => {
                alert('✅ 密钥已复制到剪贴板！');
            });
        }

        function copyUrl() {
            const key = document.getElementById('keyCode').textContent;
            const url = `https://Weique-He.github.io/personality-test/report.html?key=${key}`;
            navigator.clipboard.writeText(url).then(() => {
                alert('✅ 解锁链接已复制到剪贴板！');
            });
        }

        // 验证密钥（用于 report.html）
        function validateKey(key) {
            const validKeys = JSON.parse(localStorage.getItem('validKeys') || '{}');
            if (validKeys[key] && !validKeys[key].used) {
                validKeys[key].used = true;
                localStorage.setItem('validKeys', JSON.stringify(validKeys));
                return { valid: true, type: validKeys[key].type };
            }
            return { valid: false };
        }
    </script>
</body>
</html>
