<!DOCTYPE html>
<html lang="zh-CN">
<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .page {
            display: none;
            padding: 40px;
            animation: fadeIn 0.5s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero {
            text-align: center;
        }

        .hero h1 {
            font-size: 2.5rem;
            color: #2d3748;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #718096;
            margin-bottom: 30px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .feature {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 20px;
            background: #f7fafc;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #4a5568;
        }

        .feature .icon {
            font-size: 1.2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.5);
        }

        .note {
            margin-top: 20px;
            color: #a0aec0;
            font-size: 0.9rem;
        }

        .progress-container {
            margin-bottom: 30px;
        }

        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            transition: width 0.5s ease;
            width: 10%;
        }

        .question-count {
            text-align: right;
            color: #718096;
            font-size: 0.9rem;
        }

        .question-card {
            background: #f7fafc;
            padding: 30px;
            border-radius: 16px;
        }

        .question-text {
            font-size: 1.3rem;
            color: #2d3748;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            padding: 18px 24px;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            color: #4a5568;
            text-align: left;
        }

        .option:hover {
            border-color: #667eea;
            background: #f0f4ff;
            transform: translateX(5px);
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid #e2e8f0;
        }

        .nav-btn {
            flex: 1;
            padding: 15px 25px;
            border: 2px solid #e2e8f0;
            background: white;
            color: #4a5568;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: #667eea;
            background: #f7fafc;
        }

        .nav-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #next-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
        }

        #next-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        #next-btn:disabled {
            background: #cbd5e0;
        }

        @media (max-width: 640px) {
            .navigation-buttons {
                flex-direction: column;
            }
            
            .nav-btn {
                width: 100%;
            }
        }

        .result-card {
            text-align: center;
        }

        .result-header {
            margin-bottom: 30px;
        }

        .type-badge {
            display: inline-block;
            padding: 10px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 50px;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
        }

        #result-title {
            font-size: 1.8rem;
            color: #2d3748;
            margin-bottom: 20px;
        }

        .result-preview {
            background: #f7fafc;
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
        }

        #result-preview-text {
            color: #4a5568;
            line-height: 1.8;

            margin-bottom: 25px;

            margin-bottom: 20px;
        }

        .premium-features {

            text-align: left;
            margin-bottom: 25px;
        }

        .premium-features li {
            padding: 10px 0;
            color: #742a5d;
            font-size: 1rem;
        }

        .btn-premium {

            color: white;
            border: none;
            padding: 18px 50px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;

            padding: 15px 40px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 50px;

            background: #f7fafc;

        .step {

        .step-number {

            height: 32px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;

            align-items: center;
            justify-content: center;

            font-size: 0.9rem;
        }

        .step-text {

            color: #4a5568;
            line-height: 1.4;
        }

        .qr-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .qr-section {
            text-align: center;
            flex: 1;
            min-width: 140px;
        }

        .qr-section h4 {
            margin: 0 0 10px 0;
            font-size: 0.95rem;
            color: #4a5568;
        }

        .qr-code {
            width: 140px;
            height: 140px;
            border-radius: 8px;
            border: 2px solid #e2e8f0;
            object-fit: cover;
        }

        .qr-tip {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #718096;

        .tips {

        }

        .tips p {
            margin: 8px 0;

            color: #742a5d;
            line-height: 1.5;
        }

        .tips p:first-child {

        }

        .tips p:last-child {
            margin-bottom: 0;
        }

        .support-info {
            text-align: center;
            padding: 15px;
            background: #f0f4ff;

            font-size: 0.9rem;
            color: #4a5568;
        }

        .support-info p {
            margin: 0;
        }

        /* 支付弹窗新样式 */
        .payment-info {
            margin-top: 15px;
        }

        .info-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #4a5568;

        .tab-btn.active {

            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .key-input-section {
            padding: 20px;
            background: #f7fafc;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        .key-input-section label {
            display: block;
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 10px;
        }

        #unlock-key {
            width: 100%;
            padding: 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            letter-spacing: 2px;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        #unlock-key:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-unlock {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-unlock:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .key-error {
            color: #e53e3e;
            font-size: 0.9rem;
            margin-top: 10px;
            text-align: center;

        }

        .key-tips {
            background: #fff5f7;

        .key-tips p {

            margin-bottom: 10px;

        .key-tips li {

        .payment-proof-guide h4 {
            margin: 0 0 12px 0;
            font-size: 0.95rem;
            color: #2d3748;
        }

        .payment-proof-guide ol {
            margin: 0 0 10px 0;
            padding-left: 20px;
            font-size: 0.85rem;
            color: #4a5568;
            line-height: 1.8;
        }

        .payment-proof-guide li {
            margin-bottom: 6px;
        }

        .guide-note {
            margin: 0;
            font-size: 0.8rem;
            color: #718096;
            font-style: italic;
        }

        @media (max-width: 640px) {
            .qr-container {
                flex-direction: column;
                align-items: center;
            }
            
            .payment-steps {
                flex-direction: column;
                gap: 15px;
            }
            
            .step {
                display: flex;
                align-items: center;
                gap: 10px;
                text-align: left;
                justify-content: flex-start;
            }
            
            .step-number {
                margin: 0;
                flex-shrink: 0;
            }
            
            .modal-content {
                width: 95%;
                max-height: 95vh;
            }
        }
    </style>
</head>

    <div class="container">

                    { text: "执行者，完成任务", type: "S" },
                    { text: "创意者，提供想法", type: "N" },
                    { text: "协调者，促进合作", type: "F" }
                ]
            },
            {
                text: "压力之下，你会？",
                options: [
                    { text: "更加专注，效率提升", type: "J" },
                    { text: "寻求支持，与人倾诉", type: "E" },
                    { text: "独自消化，自我调节", type: "I" },
                    { text: "暂时逃避，调整状态", type: "P" }
                ]
            }
        ];

        // 性格类型结果
        const personalityTypes = {
            "EJ": {
                title: "🌟 魅力领导者",
                preview: "你天生具有领导才能，善于组织和管理。你的外向性格让你轻松建立人脉，判断力使你能够做出明智决策。"
            },
            "EP": {
                title: "🎨 创意探索者",
                preview: "你充满活力和创造力，喜欢尝试新事物。你的适应能力让你在各种环境中都能如鱼得水。"
            },
            "IJ": {
                title: "🏆 稳健策划师",
                preview: "你深思熟虑，做事有条理。你的内省让你能够深入思考，计划性使你能够稳步达成目标。"
            },
            "IP": {
                title: "🦋 自由思想家",
                preview: "你独立而灵活，追求内心的自由。你的适应性让你能够从容应对变化，保持内心的平静。"
            },
            "TF": {
                title: "⚖️ 平衡协调者",
                preview: "你兼具理性和感性，能够在逻辑和情感之间找到平衡。这让你成为优秀的沟通者和调解者。"
            },
            "NS": {
                title: " 实践创新者",
                preview: "你既有远见又注重实际，能够将创意落地。你的务实精神让你能够把想法变为现实。"
            }
        };

        // 状态管理
        let currentQuestion = 0;
        let answers = new Array(10).fill(null); // 存储每道题的答案
        let resultType = "";

        // DOM 元素
        const startPage = document.getElementById('start-page');
        const quizPage = document.getElementById('quiz-page');
        const resultPage = document.getElementById('result-page');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const unlockBtn = document.getElementById('unlock-btn');
        const questionText = document.getElementById('question-text');
        const optionsContainer = document.getElementById('options');
        const progressFill = document.getElementById('progress');
        const currentQSpan = document.getElementById('current-q');
        const typeBadge = document.getElementById('type-badge');
        const resultTitle = document.getElementById('result-title');
        const resultPreviewText = document.getElementById('result-preview-text');

        // 初始化
        function init() {
            startBtn.addEventListener('click', startQuiz);
            restartBtn.addEventListener('click', restartQuiz);
            unlockBtn.addEventListener('click', showUnlockModal);
        }

        // 开始测试
        function startQuiz() {
            startPage.classList.remove('active');
            quizPage.classList.add('active');
            currentQuestion = 0;
            answers = [];
            showQuestion();
        }

        // 显示题目
        function showQuestion() {
            const question = questions[currentQuestion];
            questionText.textContent = question.text;
            currentQSpan.textContent = currentQuestion + 1;
            progressFill.style.width = `${((currentQuestion) / questions.length) * 100}%`;
            
            optionsContainer.innerHTML = '';
            question.options.forEach((option, index) => {
                const optionEl = document.createElement('div');
                optionEl.className = 'option';
                optionEl.textContent = option.text;
                
                // 如果这题已经选过，恢复选中状态
                if (answers[currentQuestion] === option.type) {
                    optionEl.classList.add('selected');
                }
                
                optionEl.addEventListener('click', () => selectOption(option.type));
                optionsContainer.appendChild(optionEl);
            });
            
            // 更新按钮状态
            updateButtons();
        }

        // 更新按钮状态
        function updateButtons() {
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            
            // 上一题按钮：第一题时禁用
            prevBtn.disabled = (currentQuestion === 0);
            
            // 下一题按钮：有答案时才启用
            nextBtn.disabled = (answers[currentQuestion] === null);
            
            // 最后一题显示"完成"
            if (currentQuestion === questions.length - 1) {
                nextBtn.innerHTML = '完成测试 ✓';
            } else {
                nextBtn.innerHTML = '下一题 ➡';
            }
        }

        // 选择答案
        function selectOption(type) {
            // 保存当前答案
            answers[currentQuestion] = type;
            
            // 更新 UI 选中状态
            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                opt.classList.remove('selected');
                if (answers[currentQuestion] === questions[currentQuestion].options.find(o => o.text === opt.textContent).type) {
                    opt.classList.add('selected');
                }
            });
            
            // 启用下一题按钮
            updateButtons();
        }

        // 上一题
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                showQuestion();
            }
        }

        // 下一题
        function nextQuestion() {
            if (answers[currentQuestion] === null) {
                alert('请先选择一个答案！');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                showQuestion();
            } else {
                // 完成测试
                showResult();
            }
        }

        // 计算结果
        function calculateResult() {
            const typeCount = {};
            answers.forEach(type => {
                typeCount[type] = (typeCount[type] || 0) + 1;
            });
            
            // 简化计算：根据主要倾向确定类型
            const E = (typeCount['E'] || 0) + (typeCount['J'] || 0);
            const I = (typeCount['I'] || 0) + (typeCount['P'] || 0);
            const T = (typeCount['T'] || 0);
            const F = (typeCount['F'] || 0);
            
            const firstDim = E >= I ? 'E' : 'I';
            const secondDim = T >= F ? 'J' : 'P';
            
            return firstDim + secondDim;
        }

        // 显示结果
        function showResult() {
            quizPage.classList.remove('active');
            resultPage.classList.add('active');
            
            resultType = calculateResult();
            const result = personalityTypes[resultType] || personalityTypes["TF"];
            
            typeBadge.textContent = resultType;
            resultTitle.textContent = result.title;
            resultPreviewText.textContent = result.preview;
        }

        // 重新测试
        function restartQuiz() {
            resultPage.classList.remove('active');
            startPage.classList.add('active');
        }

        // 解锁付费内容
        function showUnlockModal() {
            const modal = document.createElement('div');
            modal.id = 'payment-modal';
            modal.innerHTML = `
                <div class="modal-content">
                    <div class="modal-header">
                        <h3>🔓 解锁完整报告</h3>
                        <button class="close-btn" onclick="closePaymentModal()">×</button>
                    </div>
                    
                    <div class="modal-body">
                        <div class="price-tag">
                            <span class="currency">¥</span>
                            <span class="amount">1.99</span>
                        </div>
                        
                        <div class="payment-steps">
                            <div class="step">
                                <div class="step-number">1</div>
                                <div class="step-text">扫码支付</div>
                            </div>
                            <div class="step">
                                <div class="step-number">2</div>
                                <div class="step-text">添加客服微信</div>
                            </div>
                            <div class="step">
                                <div class="step-number">3</div>
                                <div class="step-text">发送「已付款」自动获取报告</div>
                            </div>
                        </div>
                        
                        <div class="qr-container">
                            <div class="qr-section">
                                <h4>💰 收款码</h4>
                                <img src="https://via.placeholder.com/300x300?text=请替换为收款码" alt="收款码" class="qr-code" id="pay-qr">
                                <p class="qr-tip">微信扫码支付 ¥1.99</p>
                            </div>
                            <div class="qr-section">
                                <h4>🤖 客服微信</h4>
                                <img src="https://via.placeholder.com/300x300?text=请替换为客服微信" alt="客服微信" class="qr-code" id="service-qr">
                                <p class="qr-tip">扫码添加客服</p>
                            </div>
                        </div>
                        
                        <div class="payment-info">
                            <div class="info-tabs">
                                <button class="tab-btn active" onclick="switchTab('pay')">方式 1：扫码付款</button>
                                <button class="tab-btn" onclick="switchTab('key')">方式 2：已有密钥</button>
                            </div>

                            <!-- 扫码付款 -->
                            <div id="pay-tab" class="tab-content active">
                                <div class="qr-container">
                                    <div class="qr-section">
                                        <h4>💰 收款码</h4>
                                        <img src="Picture/收款码.png" alt="收款码" class="qr-code">
                                        <p class="qr-tip">微信扫码支付 ¥1.99</p>
                                    </div>
                                    <div class="qr-section">
                                        <h4>🤖 客服微信</h4>
                                        <img src="Picture/客服微信.png" alt="客服微信" class="qr-code">
                                        <p class="qr-tip">扫码添加客服</p>
                                    </div>
                                </div>
                                
                                <div class="tips">
                                    <p>✅ 付款后添加客服微信</p>
                                    <p>✅ 客服发送解锁密钥</p>
                                    <p>✅ 返回本网页输入密钥解锁报告</p>
                                </div>
                            </div>

                            <!-- 密钥输入 -->
                            <div id="key-tab" class="tab-content">
                                <div class="key-input-section">
                                    <label for="unlock-key">请输入解锁密钥：</label>
                                    <input type="text" id="unlock-key" placeholder="格式：XX-XXXX（如客服发给您的）" maxlength="20">
                                    <button class="btn-unlock" onclick="validateAndUnlock()">🔓 解锁完整报告</button>
                                    <p class="key-error" id="key-error"></p>
                                </div>
                                <div class="key-tips">
                                    <p>💡 密钥获取方式：</p>
                                    <ol>
                                        <li>扫码支付 ¥1.99</li>
                                        <li>添加客服微信</li>
                                        <li>发送付款截图</li>
                                        <li>客服发送解锁密钥</li>
                                    </ol>
                                </div>
                            </div>
                        </div>
                        
                        <div class="support-info">
                            <p>💬 遇到问题？联系微信：<strong style="color:#667eea;">wzsOctober</strong></p>
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);
            modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(3px);';
        }

        function closePaymentModal() {
            const modal = document.getElementById('payment-modal');
            if (modal) modal.remove();
        }

        // 切换 Tab
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tab + '-tab').classList.add('active');
        }

        // 验证并解锁
        function validateAndUnlock() {
            const key = document.getElementById('unlock-key').value.trim();
            const errorEl = document.getElementById('key-error');
            
            if (!key) {
                errorEl.textContent = '请输入解锁密钥';
                return;
            }

            // 验证密钥格式（简单验证）
            const keyPattern = /^[A-Z]{2}-[A-Z0-9]{4}$/i;
            if (!keyPattern.test(key)) {
                errorEl.textContent = '密钥格式不正确，请检查后重试';
                return;
            }

            // 提取性格类型
            const type = key.split('-')[0].toUpperCase();
            
            // 验证通过，跳转到报告页面
            errorEl.textContent = '✅ 验证成功，正在跳转...';
            errorEl.style.color = '#48bb78';
            
            setTimeout(() => {
                window.location.href = `report.html?type=${type}`;
            }, 1000);
        }

        // 支持回车键提交
        document.addEventListener('DOMContentLoaded', function() {
            const keyInput = document.getElementById('unlock-key');
            if (keyInput) {
                keyInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        validateAndUnlock();
                    }
                });
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
